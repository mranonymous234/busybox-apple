- name: Configure BusyBox
  run: |
    cd busybox
    make defconfig

    cat >> .config << 'EOF'
CONFIG_STATIC=y

# Core tools only
CONFIG_CAT=y
CONFIG_LS=y
CONFIG_ECHO=y
CONFIG_GREP=y
CONFIG_PWD=y
CONFIG_MKDIR=y
CONFIG_RM=y
CONFIG_TOUCH=y
CONFIG_CP=y
CONFIG_MV=y
CONFIG_FIND=y

# Disable system login stuff (fix utmp.h issues)
CONFIG_FEATURE_UTMP=n
CONFIG_FEATURE_WTMP=n
CONFIG_FEATURE_SUID=n
EOF
