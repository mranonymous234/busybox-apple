name: Build BusyBox iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install make

      - name: Clone BusyBox
        run: |
          git clone git://busybox.net/busybox.git
          cd busybox
          git checkout 1_36_1

      - name: Configure minimal iOS build
        run: |
          cd busybox

          make defconfig

          # Force static build
          sed -i '' 's/.*CONFIG_STATIC.*/CONFIG_STATIC=y/' .config

          # Core utilities only
          echo "CONFIG_LS=y" >> .config
          echo "CONFIG_CAT=y" >> .config
          echo "CONFIG_ECHO=y" >> .config
          echo "CONFIG_GREP=y" >> .config
          echo "CONFIG_PWD=y" >> .config
          echo "CONFIG_MKDIR=y" >> .config
          echo "CONFIG_RM=y" >> .config
          echo "CONFIG_CP=y" >> .config
          echo "CONFIG_MV=y" >> .config
          echo "CONFIG_TOUCH=y" >> .config
          echo "CONFIG_FIND=y" >> .config

          # ❌ Fix your utmp.h error (IMPORTANT)
          echo "# CONFIG_FEATURE_UTMP is not set" >> .config
          echo "# CONFIG_FEATURE_WTMP is not set" >> .config

          # Remove Linux-only subsystems
          echo "# CONFIG_LOGIN is not set" >> .config
          echo "# CONFIG_SU is not set" >> .config
          echo "# CONFIG_CROND is not set" >> .config
          echo "# CONFIG_INIT is not set" >> .config

      - name: Build BusyBox
        run: |
          cd busybox

          make clean
          make -j$(sysctl -n hw.ncpu) \
            CROSS_COMPILE="" \
            CC="clang" \
            CFLAGS="-isysroot $(xcrun --sdk iphoneos --show-sdk-path) -arch arm64"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: busybox-ios
          path: busybox/busybox
