name: Build iOS BusyBox (arm64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools
      run: |
        brew install make

    - name: Download BusyBox
      run: |
        curl -LO https://busybox.net/downloads/busybox-1.36.1.tar.bz2
        tar -xf busybox-1.36.1.tar.bz2
        mv busybox-1.36.1 busybox

    - name: Create minimal config
      run: |
        cd busybox

        make defconfig

        # minimal tools only
        scripts/config --enable CAT
        scripts/config --enable LS
        scripts/config --enable ECHO
        scripts/config --enable GREP
        scripts/config --enable PWD
        scripts/config --enable MKDIR
        scripts/config --enable RM
        scripts/config --enable TOUCH
        scripts/config --enable CP
        scripts/config --enable MV
        scripts/config --enable FIND

        # IMPORTANT: disable utmp/wtmp (macOS + iOS safe)
        scripts/config --disable FEATURE_UTMP || true
        scripts/config --disable FEATURE_WTMP || true

        # static build
        scripts/config --enable STATIC

    - name: Build for iOS (arm64)
      run: |
        cd busybox

        export SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        export CC=$(xcrun --sdk iphoneos -f clang)

        make clean || true

        make -j$(sysctl -n hw.ncpu) \
          CC="$CC" \
          CFLAGS="--target=arm64-apple-ios -isysroot $SDK -O2" \
          LDFLAGS="--target=arm64-apple-ios -isysroot $SDK"

    - name: Strip binary
      run: |
        strip busybox/busybox || true

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: busybox-ios-arm64
        path: busybox/busybox
