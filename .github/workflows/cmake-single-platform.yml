name: Build Minimal BusyBox (iOS ARM64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout BusyBox
        uses: actions/checkout@v4
        with:
          repository: xerub/busybox-apple
          path: busybox

      - name: Setup SDK
        run: |
          echo "SDK=$(xcrun --sdk iphoneos --show-sdk-path)" >> $GITHUB_ENV

      - name: Clean config
        working-directory: busybox
        run: |
          make distclean || true
          make defconfig

      - name: Enable only required applets
        working-directory: busybox
        run: |
          cat > .config << 'EOF'
          CONFIG_STATIC=y
          CONFIG_FEATURE_SH_STANDALONE=y

          CONFIG_LS=y
          CONFIG_CAT=y
          CONFIG_ECHO=y
          CONFIG_GREP=y
          CONFIG_PWD=y
          CONFIG_MKDIR=y
          CONFIG_RM=y
          CONFIG_TOUCH=y
          CONFIG_CP=y
          CONFIG_MV=y
          CONFIG_FIND=y

          # disable everything else
          CONFIG_LOGIN=n
          CONFIG_SU=n
          CONFIG_WHO=n
          CONFIG_LAST=n
          CONFIG_WALL=n
          CONFIG_INIT=n
          CONFIG_ASH=n
          CONFIG_SH_IS_ASH=n
          EOF

      - name: Build BusyBox
        working-directory: busybox
        run: |
          make oldconfig
          make -j$(sysctl -n hw.ncpu) \
            CC=clang \
            CFLAGS="-arch arm64 -isysroot $SDK -miphoneos-version-min=15.0 -fPIC"

      - name: Link executable (not dylib)
        working-directory: busybox
        run: |
          clang \
            -arch arm64 \
            -isysroot "$SDK" \
            -miphoneos-version-min=15.0 \
            -o busybox \
            $(find . -name "*.o")

      - name: Strip binary
        working-directory: busybox
        run: |
          strip busybox || true

      - name: Verify
        working-directory: busybox
        run: |
          file busybox
          otool -L busybox

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: busybox-minimal-ios
          path: busybox/busybox
